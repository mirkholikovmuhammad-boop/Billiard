<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billiard Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-top">
        <h1>Бильярдная</h1>
        <button id="calendarBtn" class="secondary-btn">📅 Календарь</button>
    </div>
    <div class="header-status">
        <span id="todayTotal">За сегодня: 0.00 сом.</span>
        <button id="endDayBtn" class="danger-btn">Завершить</button>
    </div>
</header>

<main>
    <div class="tables-grid">
        <div class="table" id="table1">
            <h2>Стол 1 (Майда)</h2>
            <div class="timer" id="timer1">0:00</div>
            <div class="last-bill" id="bill1">К оплате: 0.00 сом.</div>
            <button class="start-btn" id="btn1">Старт</button>
        </div>
        <div class="table" id="table2">
            <h2>Стол 2 (Майда)</h2>
            <div class="timer" id="timer2">0:00</div>
            <div class="last-bill" id="bill2">К оплате: 0.00 сом.</div>
            <button class="start-btn" id="btn2">Старт</button>
        </div>
        <div class="table" id="table3">
            <h2>Стол 3 (Калон)</h2>
            <div class="timer" id="timer3">0:00</div>
            <div class="last-bill" id="bill3">К оплате: 0.00 сом.</div>
            <button class="start-btn" id="btn3">Старт</button>
        </div>
        <div class="table" id="table4">
            <h2>Стол 4 (Калон)</h2>
            <div class="timer" id="timer4">0:00</div>
            <div class="last-bill" id="bill4">К оплате: 0.00 сом.</div>
            <button class="start-btn" id="btn4">Старт</button>
        </div>
    </div>

    <section id="history">
        <h3>📜 История игр:</h3>
        <ul id="historyList"></ul>
    </section>
</main>

<div id="endDayModal" class="modal">
    <div class="modal-content">
        <h2>Завершить смену?</h2>
        <p>Выручка сохранится в календарь.</p>
        <button id="saveTotal" class="confirm-btn">Да, завершить</button>
        <button id="closeModal" class="cancel-btn">Отмена</button>
    </div>
</div>

<div id="calendarModal" class="modal">
    <div class="modal-content">
        <h2>История по дням</h2>
        <ul id="calendarList" style="text-align: left; max-height: 250px; overflow-y: auto; padding: 0; list-style: none;"></ul>
        <button id="closeCalendar" class="cancel-btn" style="margin-top:15px;">Закрыть</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
</html>
